services:
  - type: web
    name: ahju-backend
    env: python
    rootDir: .
    disks:
      - name: media
        mountPath: /var/data
        sizeGB: 1
    buildCommand: pip install -r requirements.txt
    startCommand: >-
      sh ./scripts/deploy_start.sh
    autoDeploy: true
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: RENDER
        value: "True"
      - key: DJANGO_MEDIA_ROOT
        value: "/var/data/media"
      - key: SEED_PRODUCTS_ON_DEPLOY
        value: "true"
      - key: PRODUCT_IMAGE_SOURCE_DIR
        value: "/opt/render/project/src/media/products"
      - key: DJANGO_ALLOWED_HOSTS
        value: "ahju-backend.onrender.com"